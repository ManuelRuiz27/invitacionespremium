name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_ENV: test
      API_PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/invitacionespremium_test
      DATABASE_POOL_MAX: 5
      DATABASE_CONNECTION_TIMEOUT_MS: 5000
      DATABASE_IDLE_TIMEOUT_MS: 30000
      CORS_ORIGINS: http://localhost:5173
      LOG_LEVEL: error
      SWAGGER_ENABLED: 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: invitacionespremium_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d invitacionespremium_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: pnpm install --no-frozen-lockfile --reporter=append-only > pnpm-install.log 2>&1

      - name: Commit updated lockfile
        if: github.event_name == 'push' && github.ref == 'refs/heads/feat/codex-010-api-foundation' && steps.install.outcome == 'success'
        run: |
          if [ -z "$(git status --porcelain -- pnpm-lock.yaml)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore(deps): update lockfile for CODEX-010"
          git push

      - name: Upload pnpm install log
        if: steps.install.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: pnpm-install-log
          path: pnpm-install.log
          retention-days: 3

      - name: Stop after install failure
        if: steps.install.outcome == 'failure'
        run: |
          tail -n 100 pnpm-install.log
          exit 1

      - name: Validate Prisma schema
        run: pnpm --filter @invitaciones/api db:validate

      - name: Format check
        id: format
        continue-on-error: true
        run: pnpm format:check > prettier-check.log 2>&1

      - name: Generate Prettier patch
        if: steps.format.outcome == 'failure'
        run: |
          pnpm format
          git diff --binary -- . ':!pnpm-lock.yaml' > prettier.patch

      - name: Commit formatted files
        if: github.event_name == 'push' && github.ref == 'refs/heads/feat/codex-010-api-foundation' && steps.format.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "style: format CODEX-010 files"
          git push

      - name: Upload Prettier diagnostics
        if: steps.format.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: prettier-diagnostics
          path: |
            prettier-check.log
            prettier.patch
          retention-days: 3

      - name: Stop after format failure
        if: steps.format.outcome == 'failure'
        run: |
          cat prettier-check.log
          exit 1

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: pnpm typecheck > typecheck.log 2>&1

      - name: Upload typecheck diagnostics
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          retention-days: 3

      - name: Stop after typecheck failure
        if: steps.typecheck.outcome == 'failure'
        run: |
          cat typecheck.log
          exit 1

      - name: Unit tests
        run: pnpm test

      - name: API integration tests
        run: pnpm --filter @invitaciones/api test:integration

      - name: Generate OpenAPI
        id: openapi
        continue-on-error: true
        run: pnpm --filter @invitaciones/api openapi:generate > openapi-generate.log 2>&1

      - name: Upload OpenAPI diagnostics
        if: steps.openapi.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: openapi-diagnostics
          path: openapi-generate.log
          retention-days: 3

      - name: Stop after OpenAPI failure
        if: steps.openapi.outcome == 'failure'
        run: |
          cat openapi-generate.log
          exit 1

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v7
        with:
          name: invitacionespremium-openapi
          path: apps/api/openapi/openapi.json
          retention-days: 7

      - name: Build
        run: pnpm build
