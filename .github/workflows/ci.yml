name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: pnpm install --no-frozen-lockfile --reporter=append-only > pnpm-install.log 2>&1

      - name: Upload generated lockfile
        if: steps.install.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: pnpm-lockfile-${{ github.sha }}
          path: pnpm-lock.yaml
          retention-days: 3

      - name: Upload pnpm install log
        if: steps.install.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: pnpm-install-log
          path: pnpm-install.log
          retention-days: 3

      - name: Stop after install failure
        if: steps.install.outcome == 'failure'
        run: |
          tail -n 80 pnpm-install.log
          exit 1

      - name: Format check
        id: format
        continue-on-error: true
        run: pnpm format:check > prettier-check.log 2>&1

      - name: Generate Prettier patch
        if: steps.format.outcome == 'failure'
        run: |
          pnpm format
          git diff --binary -- . ':!pnpm-lock.yaml' > prettier.patch

      - name: Upload Prettier diagnostics
        if: steps.format.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: prettier-diagnostics
          path: |
            prettier-check.log
            prettier.patch
          retention-days: 3

      - name: Stop after format failure
        if: steps.format.outcome == 'failure'
        run: |
          cat prettier-check.log
          exit 1

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
