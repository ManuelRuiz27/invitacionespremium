services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: invitacionespremium
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d invitacionespremium']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - invitacionespremium_postgres_data:/var/lib/postgresql/data

volumes:
  invitacionespremium_postgres_data:
